services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    ports:
      - "8008:8000"
    environment:
      PYTHONPATH: /workspace/src
      DEFAULT_PIPELINE: ${DEFAULT_PIPELINE:-manual}
      CHAT_PROVIDER: ${CHAT_PROVIDER:-ollama}
      CHAT_BASE_URL: ${CHAT_BASE_URL:-http://ollama:11434/v1}
      CHAT_API_KEY: ${CHAT_API_KEY:-ollama}
      CHAT_MODEL: ${CHAT_MODEL:-qwen2.5:3b}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-ollama}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-http://ollama:11434/v1}
      EMBED_API_KEY: ${EMBED_API_KEY:-ollama}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION_PREFIX: ${QDRANT_COLLECTION_PREFIX:-rag}
      SOURCE_DIR: ${SOURCE_DIR:-/workspace/data/corpus}
      EVAL_PATH: ${EVAL_PATH:-/workspace/data/eval/questions.json}
      TOP_K: ${TOP_K:-5}
      MIN_CONTEXT_SCORE: ${MIN_CONTEXT_SCORE:-0.25}
      HYBRID_ENABLED: ${HYBRID_ENABLED:-false}
      SEMANTIC_TOP_N: ${SEMANTIC_TOP_N:-20}
      BM25_TOP_N: ${BM25_TOP_N:-20}
      RRF_K: ${RRF_K:-60}
      RERANK_ENABLED: ${RERANK_ENABLED:-false}
      RERANK_PROVIDER: ${RERANK_PROVIDER:-token_overlap}
      RERANK_MODEL: ${RERANK_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      RERANK_TOP_N: ${RERANK_TOP_N:-20}
      BOOTSTRAP_OLLAMA_URL: http://ollama:11434
      BOOTSTRAP_QDRANT_URL: http://qdrant:6333
      BOOTSTRAP_PULL_MODELS: ${BOOTSTRAP_PULL_MODELS:-true}
      BOOTSTRAP_WAIT_TIMEOUT: ${BOOTSTRAP_WAIT_TIMEOUT:-180}
    depends_on:
      - ollama
      - qdrant
    stdin_open: true
    tty: true

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  ollama_models:
  qdrant_storage:
