services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    ports:
      - "8008:8000"
    environment:
      PYTHONPATH: /workspace/src
      DEFAULT_PIPELINE: ${DEFAULT_PIPELINE:-manual}
      CHAT_PROVIDER: ${CHAT_PROVIDER:-ollama}
      CHAT_BASE_URL: ${CHAT_BASE_URL:-http://ollama:11434/v1}
      CHAT_API_KEY: ${CHAT_API_KEY:-ollama}
      CHAT_MODEL: ${CHAT_MODEL:-qwen2.5:3b}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-ollama}
      EMBED_BASE_URL: ${EMBED_BASE_URL:-http://ollama:11434/v1}
      EMBED_API_KEY: ${EMBED_API_KEY:-ollama}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION_PREFIX: ${QDRANT_COLLECTION_PREFIX:-rag}
      QDRANT_ACTIVE_ALIAS: ${QDRANT_ACTIVE_ALIAS:-rag_active}
      API_SCHEMA_VERSION: ${API_SCHEMA_VERSION:-2026-03-27}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_me_32chars}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXP_HOURS: ${JWT_EXP_HOURS:-24}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-admin-password}
      VIEWER_USERNAME: ${VIEWER_USERNAME:-}
      VIEWER_PASSWORD: ${VIEWER_PASSWORD:-}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-default}
      DEFAULT_ACCESS_TAGS: ${DEFAULT_ACCESS_TAGS:-internal}
      SOURCE_DIR: ${SOURCE_DIR:-/workspace/data/corpus}
      EVAL_PATH: ${EVAL_PATH:-/workspace/data/eval/questions.json}
      TOP_K: ${TOP_K:-5}
      MIN_CONTEXT_SCORE: ${MIN_CONTEXT_SCORE:-0.25}
      HYBRID_ENABLED: ${HYBRID_ENABLED:-false}
      SEMANTIC_TOP_N: ${SEMANTIC_TOP_N:-20}
      BM25_TOP_N: ${BM25_TOP_N:-20}
      RRF_K: ${RRF_K:-60}
      RERANK_ENABLED: ${RERANK_ENABLED:-false}
      RERANK_PROVIDER: ${RERANK_PROVIDER:-token_overlap}
      RERANK_MODEL: ${RERANK_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      RERANK_TOP_N: ${RERANK_TOP_N:-20}
      BOOTSTRAP_OLLAMA_URL: http://ollama:11434
      BOOTSTRAP_QDRANT_URL: http://qdrant:6333
      BOOTSTRAP_PULL_MODELS: ${BOOTSTRAP_PULL_MODELS:-true}
      BOOTSTRAP_WAIT_TIMEOUT: ${BOOTSTRAP_WAIT_TIMEOUT:-180}
      PHOENIX_COLLECTOR_ENDPOINT: ${PHOENIX_COLLECTOR_ENDPOINT:-http://phoenix:4317}
    depends_on:
      - ollama
      - qdrant
    stdin_open: true
    tty: true

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"

volumes:
  ollama_models:
  qdrant_storage:
